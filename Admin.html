<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Admin — The Lamb Place</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#0e1a0f;--forest:#1c3a22;--gold:#c8922a;--gold-light:#e4b85a;--gold-pale:#f5e4bc;--cream:#faf6ec;--parchment:#f2eada;--red:#c0392b;--green:#27ae60;--border:rgba(200,146,42,.2);--sidebar-w:260px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--ink);display:flex}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--forest);height:100vh;display:flex;flex-direction:column;border-right:1px solid rgba(200,146,42,.25);overflow:hidden;transition:transform .3s;z-index:50;}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(200,146,42,.2);}
.sb-logo h1{font-family:'Amiri',serif;font-size:1.4rem;color:var(--gold)}
.sb-logo p{font-size:.72rem;color:var(--gold-pale);opacity:.6;margin-top:3px;letter-spacing:.08em}
.sb-nav{flex:1;overflow-y:auto;padding:16px 0}
.sb-item{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;color:rgba(245,228,188,.65);font-size:.9rem;transition:background .2s,color .2s;border-left:3px solid transparent;user-select:none;}
.sb-item:hover{background:rgba(200,146,42,.1);color:var(--gold-pale)}
.sb-item.active{background:rgba(200,146,42,.18);color:var(--gold);border-left-color:var(--gold)}
.sb-item .ico{font-size:1.15rem;width:24px;text-align:center}
.sb-badge{margin-left:auto;background:var(--gold);color:var(--forest);font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:40px}
.sb-footer{padding:16px 20px;border-top:1px solid rgba(200,146,42,.2);font-size:.75rem;color:rgba(245,228,188,.4);line-height:1.6;}
.sb-footer a{color:var(--gold);text-decoration:none;display:block;margin-top:6px;font-size:.8rem}
.main{flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column;background:var(--parchment)}
.topbar{background:#fff;border-bottom:1px solid rgba(0,0,0,.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;flex-shrink:0;}
.topbar-title{font-family:'Amiri',serif;font-size:1.4rem;color:var(--forest)}
.topbar-right{display:flex;align-items:center;gap:12px}
.tb-btn{display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:.82rem;letter-spacing:.06em;cursor:pointer;border:none;transition:all .2s;font-weight:500;}
.tb-btn.primary{background:var(--gold);color:var(--forest)}
.tb-btn.primary:hover{background:var(--gold-light)}
.tb-btn.ghost{background:transparent;border:1.5px solid var(--border);color:var(--ink)}
.tb-btn.ghost:hover{border-color:var(--gold);color:var(--forest)}
.menu-toggle{display:none;background:none;border:none;cursor:pointer;padding:8px;font-size:1.3rem;color:var(--forest)}
.view{display:none;padding:24px;flex:1}
.view.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border:1px solid rgba(0,0,0,.07);border-top:3px solid var(--gold);padding:20px;border-radius:3px}
.stat-n{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.stat-v{font-family:'Amiri',serif;font-size:2.2rem;color:var(--forest);line-height:1}
.stat-s{font-size:.78rem;color:#888;margin-top:4px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.sh h2{font-family:'Amiri',serif;font-size:1.5rem;color:var(--forest)}
.tbl-wrap{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:3px;overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;min-width:600px}
.tbl th{padding:12px 16px;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);border-bottom:2px solid var(--parchment);text-align:left;white-space:nowrap;background:#fff}
.tbl td{padding:13px 16px;border-bottom:1px solid var(--parchment);font-size:.88rem;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,146,42,.04)}
.thumb{width:52px;height:42px;object-fit:cover;border-radius:3px;background:var(--parchment);display:block}
.no-thumb{width:52px;height:42px;background:var(--parchment);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.pill-a{display:inline-block;padding:3px 12px;border-radius:40px;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.pill-ok{background:#e8f5e9;color:#27ae60}
.pill-rsvd{background:#fce4e4;color:#c0392b}
.act-btns{display:flex;gap:6px;flex-wrap:wrap}
.act-btn{padding:6px 13px;border:1.5px solid;border-radius:3px;font-size:.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.act-btn.edit{border-color:var(--gold);color:var(--forest);background:transparent}
.act-btn.edit:hover{background:var(--gold);color:var(--forest)}
.act-btn.del{border-color:#e0c0c0;color:#c0392b;background:transparent}
.act-btn.del:hover{background:#c0392b;color:#fff;border-color:#c0392b}
.act-btn.toggle{border-color:#d0e8d0;color:#27ae60;background:transparent;font-size:.72rem}
.act-btn.toggle.mark-rsvd{border-color:#e0c0c0;color:#c0392b}
.form-card{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:3px;padding:28px;max-width:680px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:560px){.form-row{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--forest);opacity:.75;font-weight:500}
input,select,textarea{background:#fafafa;border:1.5px solid rgba(0,0,0,.12);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.92rem;padding:11px 13px;border-radius:3px;outline:none;transition:border .2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold);background:#fff}
textarea{resize:vertical;min-height:70px}
.upload-zone{border:2px dashed rgba(200,146,42,.4);border-radius:6px;padding:40px 20px;text-align:center;cursor:pointer;background:rgba(200,146,42,.04);transition:border-color .2s,background .2s;position:relative;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:rgba(200,146,42,.1)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-ico{font-size:2.4rem;margin-bottom:10px}
.upload-txt{font-size:.9rem;color:var(--forest);font-weight:500}
.upload-sub{font-size:.78rem;color:#888;margin-top:4px}
.upload-preview{margin-top:16px;max-height:180px;border-radius:4px;object-fit:cover;max-width:100%}
.form-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-save{padding:12px 32px;background:var(--gold);color:var(--forest);border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn-save:hover{background:var(--gold-light)}
.btn-cancel{padding:12px 24px;background:transparent;border:1.5px solid rgba(0,0,0,.15);color:var(--ink);border-radius:3px;font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer}
.btn-danger{padding:12px 24px;background:transparent;border:1.5px solid #e0c0c0;color:var(--red);border-radius:3px;font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer}
.btn-danger:hover{background:var(--red);color:#fff;border-color:var(--red)}
.res-card{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:3px;padding:20px;margin-bottom:14px}
.res-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.res-lamb{font-family:'Amiri',serif;font-size:1.25rem;color:var(--forest)}
.res-date{font-size:.75rem;color:#888}
.res-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:12px}
.ri{background:var(--parchment);padding:10px 14px;border-radius:3px}
.ri-l{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.ri-v{font-size:.88rem;color:var(--ink)}
.res-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.r-btn{padding:8px 18px;border-radius:3px;font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;border:1.5px solid;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center}
.r-btn.contact{border-color:var(--gold);color:var(--forest)}
.r-btn.contact:hover{background:var(--gold)}
.r-btn.cancel{border-color:#e0c0c0;color:#c0392b}
.r-btn.cancel:hover{background:#c0392b;color:#fff;border-color:#c0392b}
.empty{text-align:center;padding:60px 20px;color:#aaa}
.empty-ico{font-size:3rem;margin-bottom:14px}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--forest);color:var(--gold-pale);padding:14px 22px;border-radius:4px;font-size:.9rem;box-shadow:0 8px 28px rgba(0,0,0,.25);transform:translateY(80px);opacity:0;transition:transform .3s,opacity .3s;border-left:3px solid var(--gold);}

async function deleteGalleryPhoto(id){
  try{await sb('gallery','DELETE',null,`?id=eq.${id}`);toast('Photo removed');renderGalleryAdmin();}
  catch(e){toast('⚠️ Error deleting photo');}
}

function clearGallery(){
  showConfirm('Clear all gallery photos?','All photos and videos will be permanently removed.',async()=>{
    try{await sb('gallery','DELETE',null,'?id=neq.00000000-0000-0000-0000-000000000000');toast('Gallery cleared');renderGalleryAdmin();}
    catch(e){toast('⚠️ Error clearing gallery');}
  });
}

// ── RESERVATIONS ──
async function renderReservations(){
  const el=document.getElementById('resList');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
  try{
    const res=await sb('reservations','GET',null,'?select=*&order=created_at.desc')||[];
    document.getElementById('resCount').textContent=res.length;
    if(!res.length){el.innerHTML='<div class="empty"><div class="empty-ico">📋</div><p>No reservations yet.</p></div>';return;}
    el.innerHTML=res.map(r=>`
      <div class="res-card">
        <div class="res-hdr">
          <div><div class="res-lamb">${r.lamb_name} <span style="font-size:.85rem;color:#888">(${r.lamb_id})</span></div><div class="res-date">${new Date(r.created_at).toLocaleString()}</div></div>
          <span class="pill-a ${r.status==='paid'?'pill-ok':'pill-rsvd'}" style="font-size:.72rem;padding:4px 12px">${r.status==='paid'?'Paid':'Pending'}</span>
        </div>
        <div class="res-info">
          <div class="ri"><div class="ri-l">Customer</div><div class="ri-v">${r.customer_name}</div></div>
          <div class="ri"><div class="ri-l">Phone</div><div class="ri-v"><a href="tel:${r.phone.replace(/\D/g,'')}" style="color:var(--gold)">${r.phone}</a></div></div>
          <div class="ri"><div class="ri-l">Email</div><div class="ri-v" style="font-size:.8rem">${r.email}</div></div>
          <div class="ri"><div class="ri-l">Pickup Day</div><div class="ri-v">${r.pickup==='eid1'?'📅 Day 1 of Eid':r.pickup==='eid2'?'📅 Day 2 of Eid':r.pickup||'—'}</div></div>
          <div class="ri"><div class="ri-l">Payment</div><div class="ri-v" style="color:${r.payment_type==='full'?'#27ae60':'var(--gold)'};font-weight:600">${r.payment_type==='full'?'✅ Paid in Full':'💳 25% Deposit'}</div></div>
          <div class="ri"><div class="ri-l">Paid</div><div class="ri-v" style="color:var(--gold);font-weight:600">$${r.deposit}</div></div>
          <div class="ri"><div class="ri-l">Balance Due</div><div class="ri-v" style="color:${r.balance_due===0?'#27ae60':'inherit'}">${r.balance_due===0?'Nothing owed ✓':'$'+r.balance_due}</div></div>
          <div class="ri"><div class="ri-l">Total</div><div class="ri-v">$${r.total}</div></div>
        </div>
        ${r.notes?`<div style="margin-top:10px;font-size:.82rem;color:#666;background:var(--parchment);padding:10px 14px;border-radius:3px">📝 ${r.notes}</div>`:''}
        <div class="res-actions">
          <a href="tel:${r.phone.replace(/\D/g,'')}" class="r-btn contact">📞 Call</a>
          <a href="sms:${r.phone.replace(/\D/g,'')}" class="r-btn contact">💬 Text</a>
          <a href="mailto:${r.email}?subject=Your Lamb Place Reservation — ${r.lamb_name}&body=Assalamu Alaikum ${r.customer_name},%0D%0A%0D%0AThank you for your reservation at The Lamb Place.%0D%0A%0D%0ALamb: ${r.lamb_name} (${r.lamb_id})%0D%0ATotal: $${r.total}%0D%0ABalance Due: $${r.balance_due}%0D%0A%0D%0APlease call us at (717) 449-6072 with any questions.%0D%0A%0D%0AThe Lamb Place%0D%0A(717) 449-6072 · thelambplace@gmail.com" class="r-btn contact">✉️ Email</a>
          <button class="r-btn cancel" onclick="cancelReservation('${r.id}','${r.lamb_id}','${r.customer_name}')">✕ Cancel</button>
        </div>
      </div>`).join('');
  }catch(e){el.innerHTML='<div class="empty"><p>Error loading reservations. Check your connection.</p></div>';}
}

async function cancelReservation(resId,lambId,name){
  showConfirm('Cancel Reservation?',`This will cancel ${name}'s reservation and mark the lamb as available again.`,async()=>{
    try{
      await sb('reservations','DELETE',null,`?id=eq.${resId}`);
      await sb('lambs','PATCH',{available:true},`?farm_id=eq.${lambId}`);
      toast('Reservation cancelled');renderReservations();renderDash();
    }catch(e){toast('⚠️ Error cancelling reservation');}
  });
}

async function clearReservations(){
  showConfirm('Clear All Reservations?','This permanently deletes all reservation records.',async()=>{
    try{await sb('reservations','DELETE',null,'?id=neq.00000000-0000-0000-0000-000000000000');toast('All reservations cleared');renderReservations();}
    catch(e){toast('⚠️ Error clearing reservations');}
  });
}

// ── SETTINGS ──
function saveSettings(){toast('✓ Settings saved (update site files to apply changes)');}

// ── EXPORT ──
async function exportData(){
  try{
    const [lambs,res,gallery]=await Promise.all([
      sb('lambs','GET',null,'?select=*'),
      sb('reservations','GET',null,'?select=*'),
      sb('gallery','GET',null,'?select=*')
    ]);
    const data={lambs,reservations:res,gallery,exported:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`thelambplace-${new Date().toISOString().slice(0,10)}.json`;
    a.click();toast('✓ Data exported');
  }catch(e){toast('⚠️ Export failed');}
}

function importData(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);toast('✓ Data loaded (import to Supabase via SQL editor for full restore)');console.log(d);}catch{toast('⚠️ Invalid file');}};
  r.readAsText(file);
}

// Init
renderDash();
</script>
